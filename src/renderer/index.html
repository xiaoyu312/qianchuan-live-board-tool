<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>千川直播大屏采集工具</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <aside class="panel">
      <header>
        <div class="eyebrow">Qianchuan workspace</div>
        <h1>千川直播大屏采集工具</h1>
        <p>内置浏览器采集直播大屏，数据先进入实时表，确认后再导出。</p>
      </header>

      <section class="steps block">
        <div class="block-title">流程</div>
        <div class="step"><b>1</b><span>登录千川账号</span></div>
        <div class="step"><b>2</b><span>进入直播大屏页面</span></div>
        <div class="step"><b>3</b><span>设置采集间隔、下播时间和主播排班</span></div>
        <div class="step"><b>4</b><span>数据先进实时表，确认后再导出</span></div>
      </section>

      <section class="settings block">
        <div class="block-title">入口</div>
        <label class="field">
          <span>直播大屏地址</span>
          <input id="urlInput" />
        </label>
        <div class="actions">
          <button id="openBtn">打开直播大屏</button>
          <button id="exportBtn">导出表格</button>
        </div>
        <div class="path" id="outputPath">采集后点击导出表格选择保存位置</div>
      </section>

      <section class="settings block">
        <div class="block-title">采集设置</div>
        <label class="field compact">
          <span>采集间隔</span>
          <select id="intervalSelect">
            <option value="5">5分钟</option>
            <option value="15">15分钟</option>
            <option value="30">30分钟</option>
            <option value="60">1小时</option>
          </select>
        </label>
        <label class="field compact">
          <span>下播时间</span>
          <input id="liveEndInput" type="time" value="15:00" />
        </label>
      </section>

      <section class="settings block">
        <div class="setting-head">
          <div class="setting-title">主播排班</div>
          <button id="addHostBtn" class="small" type="button">添加</button>
        </div>
        <div id="hostRows" class="host-rows"></div>
      </section>

      <div class="actions">
        <button id="startBtn" class="primary">开始采集</button>
        <button id="stopBtn">停止</button>
      </div>

      <dl class="status">
        <div><dt>状态</dt><dd id="statusText">等待操作</dd></div>
        <div><dt>下一次采集</dt><dd id="nextText">-</dd></div>
        <div><dt>最近结果</dt><dd id="lastText">-</dd></div>
      </dl>
    </aside>

    <main class="browser">
      <section class="web-panel">
        <div class="section-head">
          <div>
            <div class="eyebrow">browser</div>
            <h2>千川页面</h2>
          </div>
          <div class="browser-actions">
            <button id="refreshPageBtn" class="small" type="button">刷新</button>
            <div id="tabBar" class="tabs"></div>
          </div>
        </div>
        <div id="webviewHost" class="webview-host"></div>
      </section>
      <div class="resize-handle" data-resize="web-data"></div>
      <section class="data-panel">
        <div class="data-head">
          <div>
            <div class="eyebrow">database</div>
            <h2>实时登记数据</h2>
          </div>
          <span id="rowCount">0 条</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="dataHead"></thead>
            <tbody id="dataBody">
              <tr><td>暂无数据</td></tr>
            </tbody>
          </table>
        </div>
      </section>
      <div class="resize-handle" data-resize="data-warning"></div>
      <section class="warning-panel">
        <div class="data-head">
          <div>
            <div class="eyebrow">warning</div>
            <h2>预警</h2>
          </div>
          <span id="warningCount">0 条</span>
        </div>
        <div id="warningBody" class="warning-body">
          <div class="empty-warning">等待至少 2 个时段数据后开始判断。</div>
        </div>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
